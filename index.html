<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear さがっぱ＝シッダッタ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style/entry.css">
</head>

<body class="horror-body">
    <div class="container horror-page">
        
        <header class="horror-header">
            <h1 class="horror-title">WELCOME</h1>
            <p class="warning-msg">⚠️ 本人以外、閲覧禁止 ⚠️</p>
        </header>

        <div class="photo-area horror-photo">
            <img src="images/2shot.jpg" alt="俺等のツーショ" class="main-photo">
            <div class="photo-overlay"></div> </div>

        <div class="question-box ritual-box">
            <h2 class="ritual-label">【 ユアソウルの確認 】</h2>
            <p class="question-text">私が自転車で転倒したのは<br>どこの駐車場？</p>

            <p class="hint">💡 チェーン名を半角英字で</p>

            <button onclick="startQuiz()" class="enter-button blood-button">解答入力</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
